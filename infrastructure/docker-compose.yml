version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 5s
      timeout: 3s

  wirefall-api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGO_URI=mongodb://mongo:27017/waf_db
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    volumes:
      - ./model/checkpoints:/app/model/checkpoints
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  wirefall-logs:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.logs
    ports:
      - "8002:8002"
    environment:
      - MONGO_URI=mongodb://mongo:27017/waf_db
    depends_on:
      mongo:
        condition: service_healthy

  openresty:
    image: openresty/openresty:alpine
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./lua/:/etc/nginx/lua/:ro
    depends_on:
      - wirefall-api
    networks:
      - default

volumes:
  redis_data:
  mongo_data:
