apiVersion: apps/v1
kind: Deployment
metadata:
  name: wirefall-api
  labels:
    app: wirefall-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wirefall-api
  template:
    metadata:
      labels:
        app: wirefall-api
    spec:
      containers:
        - name: api
          image: wirefall/api:latest
          ports:
            - containerPort: 8001
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: wirefall-secrets
                  key: redis-url
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: wirefall-secrets
                  key: mongo-uri
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: wirefall-api
spec:
  selector:
    app: wirefall-api
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wirefall-logs
  labels:
    app: wirefall-logs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wirefall-logs
  template:
    metadata:
      labels:
        app: wirefall-logs
    spec:
      containers:
        - name: logs
          image: wirefall/logs:latest
          ports:
            - containerPort: 8002
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: wirefall-secrets
                  key: mongo-uri
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: wirefall-logs
spec:
  selector:
    app: wirefall-logs
  ports:
    - port: 8002
      targetPort: 8002
  type: ClusterIP
